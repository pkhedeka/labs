{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="pf-v5-l-bullseye">
    <div class="pf-v5-c-card" style="width: 400px; margin-top: 3rem;">
        <div class="pf-v5-c-card__title">
            <h1 class="pf-v5-c-card__title-text">Admin Login</h1>
        </div>
        <div class="pf-v5-c-card__body">
            <form method="post" action="{{ url_for('login') }}" class="pf-v5-c-form">
                <div class="pf-v5-c-form__group">
                    <label class="pf-v5-c-form__label" for="username">
                        <span class="pf-v5-c-form__label-text">Username</span>
                    </label>
                    <div class="pf-v5-c-form__group-control">
                        <input class="pf-v5-c-form-control" type="text" id="username" name="username" required autofocus>
                    </div>
                </div>

                <div class="pf-v5-c-form__group">
                    <label class="pf-v5-c-form__label" for="password">
                        <span class="pf-v5-c-form__label-text">Password</span>
                    </label>
                    <div class="pf-v5-c-form__group-control">
                        <input class="pf-v5-c-form-control" type="password" id="password" name="password" required>
                    </div>
                </div>

                <div class="pf-v5-c-form__group pf-m-action">
                    <div class="pf-v5-c-form__actions">
                        <button class="pf-v5-c-button pf-m-primary" type="submit">Log in</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
