{% extends "base.html" %}
{% block title %}Change Password — OCP Lab Portal{% endblock %}
{% block content %}
<div class="pf-v5-l-bullseye">
    <div class="pf-v5-c-card" style="width: 420px; margin-top: 3rem;">
        <div class="pf-v5-c-card__title">
            <h1 class="pf-v5-c-card__title-text">Set New Password</h1>
        </div>
        <div class="pf-v5-c-card__body">
            {% if force_change %}
            <p style="color: #f0ab00; margin-bottom: 1.25rem; font-size: 0.9rem;">
                You must set a new password before continuing.
            </p>
            {% endif %}
            <form method="post" action="{{ url_for('change_password') }}" class="pf-v5-c-form">
                <div class="pf-v5-c-form__group">
                    <label class="pf-v5-c-form__label" for="password">
                        <span class="pf-v5-c-form__label-text">New Password</span>
                    </label>
                    <div class="pf-v5-c-form__group-control">
                        <input class="pf-v5-c-form-control" type="password" id="password" name="password"
                               required autofocus minlength="8" placeholder="Minimum 8 characters">
                    </div>
                </div>

                <div class="pf-v5-c-form__group">
                    <label class="pf-v5-c-form__label" for="password2">
                        <span class="pf-v5-c-form__label-text">Confirm Password</span>
                    </label>
                    <div class="pf-v5-c-form__group-control">
                        <input class="pf-v5-c-form-control" type="password" id="password2" name="password2"
                               required minlength="8">
                    </div>
                </div>

                <div class="pf-v5-c-form__group pf-m-action">
                    <div class="pf-v5-c-form__actions">
                        <button class="pf-v5-c-button pf-m-primary" type="submit">Update Password</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
