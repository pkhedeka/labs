name: Lint

on:
  push:
    paths:
      - '**.sh'
      - '**.py'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.sh'
      - '**.py'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

  python-syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check Python syntax
        run: python -m py_compile labportal/app.py && python -m py_compile labportal/db.py && python -m py_compile labportal/config.py
